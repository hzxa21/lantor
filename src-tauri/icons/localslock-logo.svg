<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="LocalSlock logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C7CF7"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="232" ry="232" fill="url(#bg)"/>
  <!-- subtle inner highlight -->
  <rect x="64" y="64" width="896" height="896" rx="232" ry="232"
        fill="none" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
  <!-- diagonal slash -->
  <path d="M320 704 L704 320"
        stroke="white" stroke-width="92" stroke-linecap="round"/>
  <!-- node dot -->
  <circle cx="704" cy="704" r="56" fill="white"/>
</svg>

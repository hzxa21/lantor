name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Style token gate (no new raw color literals)
        run: npm run lint:css-tokens

      - name: Build frontend
        run: npm run build

      - name: Format Tauri backend
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Lint Tauri backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Tauri backend
        run: cargo test --manifest-path src-tauri/Cargo.toml
